<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Design Document Preview</title>
  <style>
    :root {
      --fg: #1f2328;
      --muted: #57606a;
      --border: #d0d7de;
      --bg-soft: #f6f8fa;
      --accent: #0969da;
    }
    body {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1.75rem 5rem;
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--fg);
      background: #fff;
    }
    h1, h2, h3, h4 { border-bottom: 1px solid var(--border); padding-bottom: .3em; margin-top: 1.8em; }
    h1 { font-size: 2em; }
    h2 { font-size: 1.5em; }
    h3 { font-size: 1.2em; }
    h4 { font-size: 1em; border: 0; }
    code { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 13px; background: var(--bg-soft); padding: 2px 5px; border-radius: 4px; }
    pre { background: var(--bg-soft); padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: 13px; line-height: 1.5; }
    pre code { background: none; padding: 0; font-size: inherit; }
    table { border-collapse: collapse; margin: 1em 0; display: block; overflow-x: auto; }
    th, td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
    th { background: var(--bg-soft); }
    .mermaid { background: #fff; padding: 1rem; border: 1px solid var(--border); border-radius: 6px; margin: 1em 0; text-align: center; }
    .mermaid svg { max-width: 100%; height: auto; }
    blockquote { border-left: 4px solid var(--border); padding: 0 1em; color: var(--muted); margin: 1em 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    hr { border: 0; border-top: 1px solid var(--border); margin: 2em 0; }
    #status { position: fixed; top: 10px; right: 10px; padding: 6px 12px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 4px; font-size: 12px; color: var(--muted); }
    #status.ok { display: none; }
    #status.err { background: #ffebe9; color: #82071e; border-color: #ff8182; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>
  <div id="status">Loading…</div>
  <div id="content"></div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, securityLevel: 'loose', theme: 'default' });

    const status = document.getElementById('status');
    const content = document.getElementById('content');

    const params = new URLSearchParams(location.search);
    const file = params.get('file') || 'design.md';
    document.title = file + ' — Preview';

    const decode = (s) => {
      const t = document.createElement('textarea');
      t.innerHTML = s;
      return t.value;
    };

    try {
      const r = await fetch(file + '?t=' + Date.now(), { cache: 'no-store' });
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      const md = await r.text();

      let html = marked.parse(md);
      html = html.replace(
        /<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g,
        (_, body) => `<div class="mermaid">${decode(body)}</div>`
      );
      content.innerHTML = html;

      await mermaid.run({ querySelector: '.mermaid' });
      status.classList.add('ok');
    } catch (e) {
      status.classList.add('err');
      status.textContent = 'Error: ' + e.message;
      content.innerHTML = `<p>Failed to load <code>${file}</code>. If you opened this file directly via <code>file://</code>, the browser blocks cross-file fetch. Run the included <code>preview.sh</code> instead, which serves the directory over HTTP.</p>`;
    }
  </script>
</body>
</html>
